<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .loading-text {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="loading-text">Loading...</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 设置canvas尺寸
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // 爱心粒子类
        class HeartParticle {
            constructor(x, y, targetX, targetY, delay) {
                this.x = x;
                this.y = y;
                this.targetX = targetX;
                this.targetY = targetY;
                this.delay = delay;
                this.size = Math.random() * 8 + 4;
                this.opacity = 0;
                this.speed = 0;
                this.angle = Math.random() * Math.PI * 2;
                this.vx = 0;
                this.vy = 0;
                this.phase = 'forming'; // forming, formed, exploding
                this.formProgress = 0;
                this.explodeProgress = 0;
                this.color = this.getRandomColor();
            }
            
            getRandomColor() {
                const colors = [
                    '#ff6b9d', '#ff8fab', '#fb6f92', 
                    '#ff85a1', '#ff99ac', '#f9c5d1',
                    '#ff477e', '#ff7096', '#ff85a1'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update(deltaTime, globalTime) {
                // 形成阶段
                if (globalTime < this.delay) {
                    this.opacity = 0;
                    return;
                }
                
                const localTime = globalTime - this.delay;
                
                // 形成爱心阶段 (0-2秒)
                if (localTime < 2000) {
                    this.phase = 'forming';
                    this.formProgress = localTime / 2000;
                    
                    // 从随机位置飞向目标位置
                    const ease = 1 - Math.pow(1 - this.formProgress, 3);
                    this.x = this.x + (this.targetX - this.x) * ease * 0.1;
                    this.y = this.y + (this.targetY - this.y) * ease * 0.1;
                    
                    this.opacity = Math.min(this.formProgress * 2, 1);
                    this.speed = 2 + this.formProgress * 3;
                }
                // 保持阶段 (2-2.5秒)
                else if (localTime < 2500) {
                    this.phase = 'formed';
                    this.x = this.targetX;
                    this.y = this.targetY;
                    this.opacity = 1;
                    
                    // 轻微浮动效果
                    this.y += Math.sin(localTime * 0.003) * 0.5;
                }
                // 发射阶段 (2.5秒后开始)
                else {
                    this.phase = 'exploding';
                    this.explodeProgress = (localTime - 2500) / 2000;
                    
                    if (this.explodeProgress <= 1) {
                        // 计算发射方向（从中心向外）
                        const centerX = canvas.width / 2;
                        const centerY = canvas.height / 2;
                        const dx = this.x - centerX;
                        const dy = this.y - centerY;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance > 0) {
                            const dirX = dx / distance;
                            const dirY = dy / distance;
                            
                            // 加速向外飞
                            const speed = this.explodeProgress * 15 + 5;
                            this.x += dirX * speed;
                            this.y += dirY * speed;
                            
                            // 添加一些随机偏移，让效果更自然
                            this.x += Math.sin(this.explodeProgress * 10) * 2;
                            this.y += Math.cos(this.explodeProgress * 10) * 2;
                        }
                        
                        // 逐渐淡出
                        this.opacity = 1 - this.explodeProgress;
                    }
                }
            }
            
            draw(ctx) {
                if (this.opacity <= 0) return;
                
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                
                // 绘制爱心
                ctx.beginPath();
                const s = this.size;
                ctx.moveTo(this.x, this.y + s * 0.3);
                ctx.bezierCurveTo(
                    this.x, this.y,
                    this.x - s * 0.5, this.y,
                    this.x - s * 0.5, this.y + s * 0.3
                );
                ctx.bezierCurveTo(
                    this.x - s * 0.5, this.y + s * 0.6,
                    this.x, this.y + s * 0.8,
                    this.x, this.y + s
                );
                ctx.bezierCurveTo(
                    this.x, this.y + s * 0.8,
                    this.x + s * 0.5, this.y + s * 0.6,
                    this.x + s * 0.5, this.y + s * 0.3
                );
                ctx.bezierCurveTo(
                    this.x + s * 0.5, this.y,
                    this.x, this.y,
                    this.x, this.y + s * 0.3
                );
                ctx.closePath();
                ctx.fill();
                
                // 添加发光效果
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 获取爱心形状上的点
        function getHeartPoint(t, scale) {
            // 爱心参数方程
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return {
                x: x * scale,
                y: y * scale
            };
        }
        
        // 创建粒子
        const particles = [];
        const particleCount = 250;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const heartScale = 12;
        
        for (let i = 0; i < particleCount; i++) {
            // 在爱心形状上均匀分布
            const t = (i / particleCount) * Math.PI * 2;
            const heartPos = getHeartPoint(t, heartScale);
            
            // 添加一些随机偏移，让爱心更饱满
            const randomOffset = (Math.random() - 0.5) * 20;
            const targetX = centerX + heartPos.x + randomOffset;
            const targetY = centerY + heartPos.y + randomOffset;
            
            // 随机起始位置（从屏幕边缘或随机位置）
            const startX = Math.random() * canvas.width;
            const startY = canvas.height + Math.random() * 200;
            
            // 随机延迟，形成波浪效果
            const delay = Math.random() * 1000;
            
            particles.push(new HeartParticle(startX, startY, targetX, targetY, delay));
        }
        
        // 动画循环
        let startTime = null;
        let animationId;
        
        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const globalTime = timestamp - startTime;
            
            // 清空画布，使用渐变背景
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 更新和绘制所有粒子
            particles.forEach(particle => {
                particle.update(16, globalTime);
                particle.draw(ctx);
            });
            
            // 4.5秒后跳转页面
            if (globalTime > 4500) {
                window.location.href = 'platform.html';
                return;
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        // 开始动画
        animate(0);
        
        // 点击跳过
        document.addEventListener('click', () => {
            cancelAnimationFrame(animationId);
            window.location.href = 'platform.html';
        });
    </script>
</body>
</html>
